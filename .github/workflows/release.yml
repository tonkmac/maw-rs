name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-musl:
    name: Build linux x86_64-musl (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Build maw-rs (musl static)
        env:
          MAW_BUILD_VERSION: ${{ github.ref_name }}
        run: cargo build --release --target x86_64-unknown-linux-musl --bin maw-rs
      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/maw-rs dist/maw-rs-linux-x86_64-musl
          sha256sum dist/maw-rs-linux-x86_64-musl > dist/maw-rs-linux-x86_64-musl.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: linux-musl
          path: dist/*

  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build maw-rs (arm64)
        env:
          MAW_BUILD_VERSION: ${{ github.ref_name }}
        run: cargo build --release --bin maw-rs
      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/release/maw-rs dist/maw-rs-macos-arm64
          shasum -a 256 dist/maw-rs-macos-arm64 > dist/maw-rs-macos-arm64.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: [build-linux-musl, build-macos-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cp install.sh release/install.sh
          ls -la release/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            maw-rs prebuilt binaries (zero-bun Rust port of maw).

            **Install:** download the binary for your platform, `chmod +x`, then symlink your `maw` to it
            (e.g. `ln -sf /path/to/maw-rs-macos-arm64 ~/.bun/bin/maw`). Verify with the `.sha256` files.

            - `maw-rs-macos-arm64` — macOS Apple Silicon
            - `maw-rs-linux-x86_64-musl` — Linux x86_64 (static, no libc dependency)
