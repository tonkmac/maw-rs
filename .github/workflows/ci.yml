name: CI

on:
  push:
    branches: [main, alpha]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust workspace
    # Self-hosted runner deferred until TK's Linux test server is ready.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          large-packages: true

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node cache for WASM fixtures
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/wasm-sdk/package-lock.json

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-workspace-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          cache-all-crates: true
          cache-targets: true

      - name: Build deterministic AssemblyScript WASM fixtures
        run: |
          npm --prefix packages/wasm-sdk ci
          npm --prefix packages/wasm-sdk run check:fixtures

      - name: Fetch Cargo dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if cargo fetch --locked; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build workspace tests
        shell: bash
        env:
          CARGO_BUILD_JOBS: 2
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if cargo build --workspace --tests --locked; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done

      - name: Test workspace
        env:
          CARGO_BUILD_JOBS: 2
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  musl-static:
    name: MUSL static Extism linkability
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build maw-cli for musl static
        run: cargo build --release --target x86_64-unknown-linux-musl -p maw-cli
