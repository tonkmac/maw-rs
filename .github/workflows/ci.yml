name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build deterministic AssemblyScript WASM fixtures
        run: |
          npm --prefix packages/wasm-sdk ci
          npm --prefix packages/wasm-sdk run check:fixtures

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Test workspace
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
